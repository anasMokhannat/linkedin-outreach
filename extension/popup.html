<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 320px; font-family: system-ui, sans-serif; padding: 14px; margin: 0; background: #0b1120; color: #e6ebf5; }
      h1 { font-size: 15px; margin: 0 0 8px; }
      p { font-size: 12px; color: #93a0bd; }
      label { font-size: 12px; color: #93a0bd; display: block; margin: 10px 0 4px; }
      input { width: 100%; box-sizing: border-box; padding: 7px; border-radius: 6px; border: 1px solid #28324d; background: #1b2740; color: #e6ebf5; }
      button { width: 100%; margin-top: 12px; padding: 9px; border: none; border-radius: 6px; background: #4f8cff; color: #fff; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: 0.5; }
      .status { margin-top: 10px; font-size: 12px; }
      .ok { color: #34d399; }
      .err { color: #f87171; }
    </style>
  </head>
  <body>
    <h1>Connect LinkedIn session</h1>
    <p>
      This reads only your <code>li_at</code> session cookie and sends it directly to your
      LinkedIn Outreach backend over HTTPS. It is never shown here or stored in the extension.
    </p>
    <label for="appUrl">Your app URL</label>
    <input id="appUrl" type="text" placeholder="https://your-app.vercel.app" />
    <button id="connect">Capture &amp; connect</button>
    <div id="status" class="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
